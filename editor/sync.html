<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Belgium Concert — 5D 2 ↔ Back Camera Sync</title>
<link rel="stylesheet" href="styles.css" />
<style>
  /* page-specific bits on top of the editor theme */
  #syncVideos { display: flex; gap: 10px; padding: 10px 12px 0; }
  #syncVideos .pane { flex: 1; position: relative; background: #000;
    border: 1px solid #2a3040; border-radius: 8px; overflow: hidden; }
  #syncVideos video { width: 100%; display: block; aspect-ratio: 16/9; background:#000; }
  #syncVideos .pane .lbl { position: absolute; top: 6px; left: 8px; z-index: 3;
    font: 600 12px -apple-system, sans-serif; color: #e6e9ef;
    background: rgba(14,16,20,.65); padding: 2px 8px; border-radius: 5px; }
  #notCaptured { position: absolute; inset: 0; z-index: 2; display: flex;
    align-items: center; justify-content: center; background: #000;
    color: #566; font: 700 15px -apple-system, sans-serif; letter-spacing: .12em; }
  #notCaptured[hidden] { display: none; }
  #clipInfo { color: #8b93a7; font-size: 12px; margin-left: 10px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  #clipInfo b { color: #cfd6e4; }
  #syncTl { display: block; width: 100%; height: 170px; cursor: crosshair; }
  #tlwrap { padding: 8px 12px; }
  .flagchip { display: inline-block; background: #3a2f16; color: #d9b45b;
    border-radius: 4px; padding: 0 5px; margin-left: 6px; font-size: 11px; }
</style>
</head>
<body>
<header id="topbar">
  <div class="brand">🎹 5D 2 ↔ Back Camera — audio-matched timeline</div>
  <div class="status" id="status">loading…</div>
  <div class="spacer"></div>
  <label class="audio-src">Audio:
    <select id="audioSel">
      <option value="back" selected>Back Camera (reference)</option>
      <option value="5d2">5D 2</option>
      <option value="both">Both (check sync by ear)</option>
    </select>
  </label>
  <a href="/" style="color:#8b93a7;font-size:12px;">← marker editor</a>
</header>

<main style="display:block;">
  <section id="syncVideos">
    <div class="pane">
      <span class="lbl" id="lbl5d2">5D 2</span>
      <video id="v5d2" src="/proxies/5d2.mp4" preload="auto" muted playsinline></video>
      <div id="notCaptured">NOT CAPTURED — BLACK</div>
    </div>
    <div class="pane">
      <span class="lbl">Back Camera (reference)</span>
      <video id="vback" src="/proxies/back.mp4" preload="auto" playsinline></video>
    </div>
  </section>

  <section id="transport" style="border-bottom:0;">
    <button id="playBtn" title="Space">▶︎ Play</button>
    <button data-jump="-5" title="−5s (Shift+←)">⟪ −5s</button>
    <button data-jump="5" title="+5s (Shift+→)">+5s ⟫</button>
    <button id="prevClip" title="Previous clip ([)">⇤ clip</button>
    <button id="nextClip" title="Next clip (])">clip ⇥</button>
    <div class="tc" id="timecode">00:00:00.000</div>
    <span id="clipInfo">—</span>
    <div class="spacer"></div>
    <button id="zoomFit" title="Fit (0)">Fit</button>
    <button id="zoomOut" title="Zoom out (−)">−</button>
    <button id="zoomIn" title="Zoom in (+)">+</button>
  </section>

  <section id="tlwrap">
    <canvas id="syncTl"></canvas>
  </section>

  <footer id="help" style="position:static;">
    <b>Keys:</b> Space play/pause · ←/→ ±1s · Shift+←/→ ±5s · [ ] prev/next clip · +/− zoom · 0 fit ·
    wheel = zoom · drag = scrub · click a blue block = jump to that clip
  </footer>
</main>

<script src="auth.js"></script>
<script src="sync.js"></script>
</body>
</html>
